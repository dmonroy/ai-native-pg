name: Main Branch Release

on:
  push:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  release-main:
    name: PostgreSQL ${{ matrix.pg_version }}
    runs-on: ubuntu-latest
    permissions:
      packages: write

    strategy:
      matrix:
        pg_version: [14, 15, 16, 17, 18]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push multi-arch image
        env:
          IMAGE_TAG: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:pg${{ matrix.pg_version }}-dev
        run: |
          echo "📦 Building multi-arch for PostgreSQL ${{ matrix.pg_version }}..."

          # Pull existing image for layer caching
          docker pull ${{ env.IMAGE_TAG }} || true

          # Build tags
          TAGS="-t ${{ env.IMAGE_TAG }}"

          # Add 'dev' alias for latest PostgreSQL version (18)
          if [ "${{ matrix.pg_version }}" = "18" ]; then
            TAGS="$TAGS -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:dev"
            echo "  Adding alias: dev"
          fi

          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --build-arg PG_MAJOR=${{ matrix.pg_version }} \
            --cache-from type=registry,ref=${{ env.IMAGE_TAG }} \
            --cache-to type=inline \
            $TAGS \
            --push \
            .

          echo "✅ Pushed ${{ env.IMAGE_TAG }}"
