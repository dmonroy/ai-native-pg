name: Main Branch Release

on:
  push:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  release-main:
    name: Build and push all versions
    runs-on: ubuntu-latest
    permissions:
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push all PostgreSQL versions
        run: |
          for PG_VERSION in 14 15 16 17 18; do
            IMAGE_TAG="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:pg${PG_VERSION}-dev"

            echo "📦 Building multi-arch for PostgreSQL ${PG_VERSION}..."

            # Pull existing image for layer caching
            docker pull ${IMAGE_TAG} || true

            # Build tags
            TAGS="-t ${IMAGE_TAG}"

            # Add 'dev' alias for latest PostgreSQL version (18)
            if [ "${PG_VERSION}" = "18" ]; then
              TAGS="${TAGS} -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:dev"
              echo "  Adding alias: dev"
            fi

            docker buildx build \
              --platform linux/amd64,linux/arm64 \
              --build-arg PG_MAJOR=${PG_VERSION} \
              --cache-from type=registry,ref=${IMAGE_TAG} \
              --cache-to type=inline \
              ${TAGS} \
              --push \
              .

            echo "✅ Pushed ${IMAGE_TAG}"
          done
